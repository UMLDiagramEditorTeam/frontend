    ErrorResponse_error:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Ошибка валидации запроса
        details:
          type: array
          items:
            $ref: "#/components/schemas/ValidationErrorItem"
    UnauthorizedError_error:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: Требуется аутентификация
    ForbiddenError_error:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          example: FORBIDDEN
        message:
          type: string
          example: Недостаточно прав для доступа к ресурсу
    NotFoundError_error:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Ресурс не найден
    ConflictError_error:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          example: CONFLICT
        message:
          type: string
          example: Ресурс с таким именем уже существует
    InternalServerError_error:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          example: INTERNAL_SERVER_ERROR
        message:
          type: string
          example: Внутренняя ошибка сервера
  responses:
    Unauthorized:
      description: Отсутствует или невалидный токен аутентификации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthorizedError"
    Forbidden:
      description: Доступ запрещен (попытка доступа к чужому ресурсу)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ForbiddenError"
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NotFoundError"
    Conflict:
      description: Конфликт при создании/обновлении ресурса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConflictError"
    ValidationError:
      description: Ошибка валидации запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InternalServerError"
  parameters:
    PageParam:
      name: page
      in: query
      description: Номер страницы (с 1)
      required: false
      schema:
        minimum: 1
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      description: Количество элементов на странице
      required: false
      schema:
        maximum: 100
        minimum: 1
        type: integer
        default: 20
    IdParam:
      name: id
      in: path
      description: Уникальный идентификатор ресурса
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdParam:
      name: projectId
      in: path
      description: ID проекта
      required: true
      schema:
        type: string
        format: uuid
    WindowIdParam:
      name: windowId
      in: path
      description: ID окна
      required: true
      schema:
        type: string
        format: uuid
    ClassIdParam:
      name: classId
      in: path
      description: ID класса
      required: true
      schema:
        type: string
        format: uuid
    InterfaceIdParam:
      name: interfaceId
      in: path
      description: ID интерфейса
      required: true
      schema:
        type: string
        format: uuid
    AttributeIdParam:
      name: attributeId
      in: path
      description: ID атрибута
      required: true
      schema:
        type: string
        format: uuid
    MethodIdParam:
      name: methodId
      in: path
      description: ID метода
      required: true
      schema:
        type: string
        format: uuid
    ProjectNameFilter:
      name: name
      in: query
      description: Фильтр по названию проекта (частичное совпадение)
      required: false
      schema:
        type: string
    ProjectImportedFilter:
      name: is_imported
      in: query
      description: Фильтр по флагу импорта
      required: false
      schema:
        type: boolean
    WindowTypeFilter:
      name: type
      in: query
      description: Фильтр по типу окна
      required: false
      schema:
        type: string
        enum:
        - class_diagram
        - sequence_diagram
    ClassNameFilter:
      name: name
      in: query
      description: Фильтр по имени класса (частичное совпадение)
      required: false
      schema:
        type: string
    ClassAbstractFilter:
      name: is_abstract
      in: query
      description: Фильтр по абстрактности класса
      required: false
      schema:
        type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      description: JWT токен для аутентификации
      scheme: bearer
      bearerFormat: JWT
