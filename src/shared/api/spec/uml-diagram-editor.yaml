openapi: 3.0.0
info:
  title: API визуального конструктора UML-диаграмм
  description: |
    API для визуального конструктора UML-диаграмм с генерацией кода.
    Позволяет управлять проектами, элементами диаграмм и автоматически синхронизировать визуальные модели с программным кодом.
  version: 1.1.1
servers:
- url: https://virtserver.swaggerhub.com/bbb-7fb/spec/1.1.1
  description: SwaggerHub API Auto Mocking
security:
- bearerAuth: []
tags:
- name: Auth
  description: Аутентификация и управление сессиями пользователей
- name: Users
  description: Управление пользователями системы
- name: Projects
  description: Управление проектами пользователей
- name: Windows
  description: Управление окнами в рамках проекта
- name: Classes
  description: Управление классами на холсте
- name: Interfaces
  description: Управление интерфейсами на холсте
- name: Attributes
  description: Управление атрибутами классов и интерфейсов
- name: Methods
  description: Управление методами классов и интерфейсов
- name: Relations
  description: Управление связями между элементами
paths:
  /auth/register:
    post:
      tags:
      - Auth
      summary: Регистрация нового пользователя
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /auth/login:
    post:
      tags:
      - Auth
      summary: Вход в систему
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /auth/logout:
    post:
      tags:
      - Auth
      summary: Выход из системы
      responses:
        "200":
          description: Успешный выход из системы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /auth/me:
    get:
      tags:
      - Auth
      summary: Информация о текущем пользователе
      responses:
        "200":
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /auth/password-change:
    post:
      tags:
        - Auth
      summary: Смена пароля пользователя
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: Пароль успешно изменен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"
        "400":
          description: Неверный текущий пароль или новый пароль совпадает со старым
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - bearerAuth: [ ]
  /users:
    get:
      tags:
      - Users
      summary: Получить список пользователей (только для админов)
      parameters:
      - name: page
        in: query
        description: Номер страницы (с 1)
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          default: 20
      responses:
        "200":
          description: Успешный возврат списка пользователей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    post:
      tags:
      - Users
      summary: Создать нового пользователя (только для админов)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
        required: true
      responses:
        "201":
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /users/{id}:
    get:
      tags:
      - Users
      summary: Получить пользователя по ID
      parameters:
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    put:
      tags:
      - Users
      summary: Обновить данные пользователя
      parameters:
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
        required: true
      responses:
        "200":
          description: Пользователь обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Users
      summary: Удалить пользователя
      parameters:
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Пользователь успешно удален
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /projects:
    get:
      tags:
      - Projects
      summary: Получить список проектов текущего пользователя
      parameters:
      - name: page
        in: query
        description: Номер страницы (с 1)
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          default: 20
      - name: name
        in: query
        description: Фильтр по названию проекта (частичное совпадение)
        required: false
        schema:
          type: string
      - name: is_imported
        in: query
        description: Фильтр по флагу импорта
        required: false
        schema:
          type: boolean
      responses:
        "200":
          description: Успешный возврат списка проектов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    post:
      tags:
      - Projects
      summary: Создать новый проект
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
        required: true
      responses:
        "201":
          description: Проект успешно создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /projects/{id}:
    get:
      tags:
      - Projects
      summary: Получить проект по ID
      parameters:
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Информация о проекте
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    put:
      tags:
      - Projects
      summary: Обновить данные проекта
      parameters:
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
        required: true
      responses:
        "200":
          description: Проект обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Projects
      summary: Удалить проект
      parameters:
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Проект успешно удален
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /projects/{projectId}/windows:
    get:
      tags:
      - Windows
      summary: Получить все окна проекта
      parameters:
      - name: projectId
        in: path
        description: ID проекта
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        description: Номер страницы (с 1)
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          default: 20
      - name: type
        in: query
        description: Фильтр по типу окна
        required: false
        schema:
          type: string
          enum:
          - class_diagram
          - sequence_diagram
      responses:
        "200":
          description: Список окон проекта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_2"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    post:
      tags:
      - Windows
      summary: Создать новое окно в проекте
      parameters:
      - name: projectId
        in: path
        description: ID проекта
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WindowCreate"
        required: true
      responses:
        "201":
          description: Окно создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Window"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /projects/{projectId}/windows/{id}:
    get:
      tags:
      - Windows
      summary: Получить окно по ID
      parameters:
      - name: projectId
        in: path
        description: ID проекта
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Информация об окне
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Window"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    put:
      tags:
      - Windows
      summary: Обновить данные окна
      parameters:
      - name: projectId
        in: path
        description: ID проекта
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WindowUpdate"
        required: true
      responses:
        "200":
          description: Окно обновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Window"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Windows
      summary: Удалить окно
      parameters:
      - name: projectId
        in: path
        description: ID проекта
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Окно успешно удалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /windows/{windowId}/classes:
    get:
      tags:
      - Classes
      summary: Получить все классы в окне
      parameters:
      - name: windowId
        in: path
        description: ID окна
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        description: Номер страницы (с 1)
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          default: 20
      - name: name
        in: query
        description: Фильтр по имени класса (частичное совпадение)
        required: false
        schema:
          type: string
      - name: is_abstract
        in: query
        description: Фильтр по абстрактности класса
        required: false
        schema:
          type: boolean
      responses:
        "200":
          description: Список классов в окне
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_3"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    post:
      tags:
      - Classes
      summary: Создать новый класс в окне
      parameters:
      - name: windowId
        in: path
        description: ID окна
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassCreate"
        required: true
      responses:
        "201":
          description: Класс создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /windows/{windowId}/classes/{id}:
    get:
      tags:
      - Classes
      summary: Получить класс по ID
      parameters:
      - name: windowId
        in: path
        description: ID окна
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Информация о классе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    put:
      tags:
      - Classes
      summary: Обновить данные класса
      parameters:
      - name: windowId
        in: path
        description: ID окна
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassUpdate"
        required: true
      responses:
        "200":
          description: Класс обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Classes
      summary: Удалить класс
      parameters:
      - name: windowId
        in: path
        description: ID окна
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: Уникальный идентификатор ресурса
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: Класс успешно удален
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - bearerAuth: []
  /windows/{windowId}/interfaces:
    get:
      tags:
      - Interfaces
      summary: Получить все интерфейсы в окне
      parameters:
      - name: windowId
        in: path
        description: ID окна
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        description: Номер страницы (с 1)
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Количество элементов на странице
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          default: 20
